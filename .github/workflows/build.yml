name: Release

on:
  push:
    tags: ['*']

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Generate icons from logo
        run: npx tauri icon nakama_logo.png

      - name: Build Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles nsis

      - name: Prepare artifact
        shell: bash
        run: cp src-tauri/target/release/nakama-launcher.exe "NakamaLauncher-${{ github.ref_name }}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: NakamaLauncher-windows-exe
          path: NakamaLauncher-${{ github.ref_name }}.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifacts
        run: find artifacts -type f -ls

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            Release `${{ github.ref_name }}` from commit `${{ github.sha }}`.
          files: artifacts/**/*
          draft: false
          prerelease: true
          make_latest: true
